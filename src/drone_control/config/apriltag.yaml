apriltag_detector:
  ros__parameters:
    publish_tf:   true
    family:       '36h11'
    size:         0.5          # physical tag side len in metres (match SDF model)
    max_hamming:  1            # allow one corrected bit; Gazebo camera images can be slightly blurred/aliased
    detector:
      threads:    2
      decimate:   2.0
      blur:       0.0
      refine:     true
      sharpening: 0.25
      debug:      false
    tag:
      ids:   [0, 1, 2]         # detect all AprilTag IDs in the world
      sizes: [0.5, 0.5, 0.5]   # all tags are 0.5m x 0.5m
